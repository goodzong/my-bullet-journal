<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>불렛저널</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="불렛저널">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FBF7EF">
<style>
@import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');

:root{
  --paper:#FBF7EF;
  --dot:#E1DBC9;
  --ink:#2E2A26;
  --ink-light:#928A7A;
  --line:#E4DDC9;
  --done:#4C8067;
  --migrated:#5A6B8C;
  --cancel:#B4483A;
  --tape-index:#B9C4E0;
  --tape-future:#C9B7DE;
  --tape-monthly:#9FCABF;
  --tape-daily:#F0C77E;
  --tape-collection:#E8A98A;
  --radius:10px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Noto Sans KR',sans-serif;
  color:var(--ink);
  background-color:var(--paper);
  background-image: radial-gradient(var(--dot) 1px, transparent 1px);
  background-size: 20px 20px;
  min-height:100vh;
}
#app{
  max-width:520px;
  margin:0 auto;
  padding:18px 14px 92px 14px;
  min-height:100vh;
}
.rings{
  display:flex;
  justify-content:center;
  gap:22px;
  margin-bottom:6px;
}
.rings span{
  width:10px;height:10px;border-radius:50%;
  background:var(--paper);
  border:2px solid var(--line);
  box-shadow: inset 0 0 0 2px var(--paper);
}
.tape{
  display:inline-block;
  font-family:'Gaegu',sans-serif;
  font-size:1.5rem;
  font-weight:700;
  padding:3px 16px 5px 16px;
  transform:rotate(-1.4deg);
  box-shadow:1px 2px 4px rgba(0,0,0,.10);
  margin-bottom:14px;
  border-radius:2px;
}
.tape.index{background:var(--tape-index);}
.tape.future{background:var(--tape-future);}
.tape.monthly{background:var(--tape-monthly);}
.tape.daily{background:var(--tape-daily);}
.tape.collection{background:var(--tape-collection);}

.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px;}
.subhead{font-size:.82rem;color:var(--ink-light);margin:-6px 0 14px 2px;}

.nav-arrows{display:flex;align-items:center;gap:10px;}
.arrow-btn{
  border:none;background:#fff;color:var(--ink);
  width:32px;height:32px;border-radius:50%;
  font-size:1rem;cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.12);
}
.today-btn{
  border:1px solid var(--line);background:#fff;color:var(--ink);
  padding:5px 10px;border-radius:20px;font-size:.78rem;cursor:pointer;
}

.card{
  background:#fff;
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  border:1px solid var(--line);
}
.card h3{margin:0 0 10px 0;font-size:.95rem;}

.quick-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.quick-card{
  display:flex;align-items:center;gap:12px;
  background:#fff;border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.quick-card .qicon{font-size:1.3rem;width:30px;text-align:center;}
.quick-card .qtitle{font-weight:700;font-size:.95rem;}
.quick-card .qsub{font-size:.78rem;color:var(--ink-light);}

.section-title{font-family:'Gaegu',sans-serif;font-size:1.15rem;font-weight:700;margin:18px 0 8px 2px;}

/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:.72rem;color:var(--ink-light);padding-bottom:4px;}
.cal-cell{
  background:#fff;border:1px solid var(--line);border-radius:6px;
  min-height:58px;padding:3px 4px;cursor:pointer;overflow:hidden;position:relative;
}
.cal-cell.empty{background:transparent;border:none;cursor:default;}
.cal-cell.today{border:1.5px solid var(--tape-daily);}
.cal-date{font-size:.72rem;font-weight:700;color:var(--ink-light);}
.cal-cell.today .cal-date{color:var(--ink);}
.cal-preview{font-size:8.5px;line-height:1.25;color:var(--ink-light);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-more{font-size:8px;color:var(--tape-daily);font-weight:700;}

/* entries */
.entry-list{list-style:none;margin:0;padding:0;position:relative;}
.entry-row{
  display:flex;align-items:flex-start;gap:6px;
  padding:8px 2px;border-bottom:1px dashed var(--line);
  background:var(--paper-row,#fff);
}
.entry-row:last-child{border-bottom:none;}
.bullet-btn{
  border:none;background:none;font-size:1.05rem;cursor:pointer;
  width:26px;flex-shrink:0;line-height:1.4;padding:0;
}
.b-todo{color:var(--ink);}
.b-done{color:var(--done);}
.b-migrated{color:var(--migrated);}
.b-cancelled{color:var(--cancel);}
.entry-text{flex:1;font-size:.92rem;line-height:1.4;word-break:break-word;cursor:text;padding:2px 0;}
.entry-text.done{color:var(--done);}
.entry-text.cancelled{color:var(--ink-light);text-decoration:line-through;}
.entry-text.migrated{color:var(--migrated);}
.del-btn{border:none;background:none;color:var(--ink-light);font-size:.95rem;cursor:pointer;padding:2px 4px;flex-shrink:0;}
.inline-edit-input{
  font-family:inherit;font-size:.92rem;flex:1;border:none;border-bottom:1px dashed var(--ink-light);
  background:transparent;padding:2px 0;outline:none;color:var(--ink);
}

.empty-msg{color:var(--ink-light);font-size:.85rem;padding:16px 4px;text-align:center;}

/* forms */
.add-form{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.type-row{display:flex;gap:6px;}
.type-btn{
  flex:1;border:1px solid var(--line);background:#fff;border-radius:8px;
  padding:7px 4px;font-size:.82rem;cursor:pointer;color:var(--ink-light);
}
.type-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.input-row{display:flex;gap:6px;}
.text-input{
  flex:1;border:1px solid var(--line);border-radius:8px;padding:9px 10px;
  font-size:.9rem;font-family:inherit;background:#fdfcf9;
}
.text-input:focus{outline:2px solid var(--tape-monthly);}
.add-btn{border:none;background:var(--ink);color:#fff;border-radius:8px;padding:0 16px;font-size:.9rem;cursor:pointer;}

/* checklist (goals/future/collection items) */
.chk-list{position:relative;}
.chk-row{display:flex;align-items:flex-start;gap:6px;padding:7px 2px;border-bottom:1px dashed var(--line);background:#fff;}
.chk-row:last-child{border-bottom:none;}

.drag-handle{
  cursor:grab; touch-action:none; user-select:none;
  color:var(--ink-light); font-size:.95rem; line-height:1.5;
  width:18px; flex-shrink:0; text-align:center; padding-top:2px;
}
.drag-handle:active{cursor:grabbing;}
.dragging{
  box-shadow:0 6px 14px rgba(0,0,0,.16);
  border-radius:8px; opacity:.97;
}
.drag-placeholder{
  border:1.5px dashed var(--ink-light) !important;
  border-radius:8px; background:rgba(0,0,0,.03);
  visibility:visible; opacity:.6;
}
.chk-box{width:18px;height:18px;border:1.5px solid var(--ink-light);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--done);margin-top:2px;background:#fff;}
.chk-box.done{background:var(--done);border-color:var(--done);color:#fff;}
.chk-text{flex:1;font-size:.9rem;cursor:text;padding:2px 0;}
.chk-text.done{color:var(--ink-light);text-decoration:line-through;}

/* collections */
.coll-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;margin-bottom:10px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.coll-card .ctitle{font-weight:700;font-size:.95rem;margin-bottom:3px;}
.coll-card .cmeta{font-size:.78rem;color:var(--ink-light);}
.detail-actions{display:flex;gap:8px;margin-bottom:14px;}
.action-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;font-size:.8rem;cursor:pointer;}
.action-btn.danger{color:var(--cancel);border-color:var(--cancel);}
.action-btn.danger-armed{background:var(--cancel);color:#fff;}
.back-link{border:none;background:none;color:var(--ink-light);font-size:.85rem;cursor:pointer;padding:0;margin-bottom:10px;}

.loading{color:var(--ink-light);font-size:.85rem;padding:30px 0;text-align:center;}

/* 보내기(전송) 버튼 & 모달 */
.send-btn{border:none;background:none;color:var(--ink-light);font-size:.9rem;cursor:pointer;padding:2px 5px;flex-shrink:0;}
.send-btn:hover{color:var(--ink);}
.modal-overlay{
  position:fixed;inset:0;background:rgba(46,42,38,.45);
  display:flex;align-items:center;justify-content:center;
  z-index:2000;padding:20px;
}
.modal-box{
  background:#fffdf8;border-radius:14px;padding:18px;
  max-width:380px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.22);
  max-height:88vh;overflow-y:auto;
}
.modal-box h3{margin:0 0 4px 0;font-size:1rem;}
.modal-src{font-size:.8rem;color:var(--ink-light);margin-bottom:14px;}
.modal-label{font-size:.78rem;color:var(--ink-light);display:block;margin:2px 0 4px 2px;}
.sync-card .subhead{margin:0 0 10px 2px;}

/* bottom nav */
.bottom-nav{
  position:fixed;left:0;right:0;bottom:0;
  background:#fffdf8;border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding:6px 0 max(6px, env(safe-area-inset-bottom));
  max-width:520px;margin:0 auto;
}
.nav-item{
  background:none;border:none;display:flex;flex-direction:column;align-items:center;
  gap:2px;color:var(--ink-light);font-size:.68rem;cursor:pointer;padding:4px 8px;
  border-radius:8px;
}
.nav-item .nicon{font-size:1.05rem;}
.nav-item.active{color:var(--ink);font-weight:700;}
.nav-item.active.n-index{background:rgba(185,196,224,.35);}
.nav-item.active.n-future{background:rgba(201,183,222,.35);}
.nav-item.active.n-monthly{background:rgba(159,202,191,.35);}
.nav-item.active.n-daily{background:rgba(240,199,126,.35);}
.nav-item.active.n-collection{background:rgba(232,169,138,.35);}

.toast{
  position:fixed;left:50%;bottom:78px;transform:translate(-50%,10px);
  background:var(--ink);color:#fff;padding:9px 16px;border-radius:20px;
  font-size:.8rem;opacity:0;pointer-events:none;transition:all .25s ease;max-width:80%;text-align:center;
}
.toast.show{opacity:1;transform:translate(-50%,0);}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================================================
   Supabase 저장소 — 가족 각자 로그인해서 자신의 기록만
   온라인 DB에 저장/동기화합니다.
   ========================================================= */
const SUPABASE_URL='https://wdaohojpakgfomnvtgjx.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_6wor7VHCOg6snfNn7ujOUg_bFutOpFH';
const sb=window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ flowType:'pkce' } });
let currentUser=null;

window.storage = {
  async get(key){
    try{
      const { data, error } = await sb.from('bj_data').select('value').eq('key', key).maybeSingle();
      if(error || !data) return null;
      return {key, value:data.value};
    }catch(e){ return null; }
  },
  async set(key, value){
    try{
      const { error } = await sb.from('bj_data').upsert({key, value}, {onConflict:'user_id,key'});
      if(error) return null;
      return {key, value};
    }catch(e){ return null; }
  },
  async delete(key){
    try{
      const { error } = await sb.from('bj_data').delete().eq('key', key);
      if(error) return null;
      return {key, deleted:true};
    }catch(e){ return null; }
  },
  async list(prefix){
    try{
      let query=sb.from('bj_data').select('key');
      if(prefix) query=query.like('key', prefix+'%');
      const { data, error } = await query;
      if(error) return null;
      return {keys:(data||[]).map(r=>r.key), prefix};
    }catch(e){ return null; }
  }
};

function renderLogin(msg){
  const app=document.getElementById('app');
  app.innerHTML=`
    <div class="rings"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="tape index">불렛저널</div>
    <div class="card">
      <h3>로그인</h3>
      <div class="subhead" style="margin:-2px 0 12px 0;">이메일로 받은 링크를 눌러 로그인해요. 비밀번호는 필요 없어요.</div>
      <div class="add-form">
        <input type="email" id="loginEmail" class="text-input" placeholder="이메일 주소" autocomplete="email">
        <button type="button" class="add-btn" style="align-self:flex-start;padding:9px 18px;" onclick="sendMagicLink()">매직링크 보내기</button>
      </div>
      ${msg?`<div class="subhead" style="margin-top:10px;">${esc(msg)}</div>`:''}
    </div>
  `;
}

async function sendMagicLink(){
  const email=document.getElementById('loginEmail').value.trim();
  if(!email){ showToast('이메일을 입력해주세요'); return; }
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: window.location.href } });
  if(error){ showToast('전송 실패: '+error.message); return; }
  renderLogin('메일함을 확인해서 링크를 눌러주세요 (스팸함도 확인!)');
}

function logout(){ sb.auth.signOut(); }

sb.auth.onAuthStateChange((_event, session)=>{
  const user=session?.user||null;
  if(user && (!currentUser || currentUser.id!==user.id)){ currentUser=user; render(); }
  else if(!user && currentUser){ currentUser=null; renderLogin(); }
});

/* ===================== 유틸 ===================== */
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function ymKey(y,m){return y+'-'+String(m).padStart(2,'0');}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function firstWeekday(y,m){return new Date(y,m-1,1).getDay();}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
const DOW=['일','월','화','수','목','금','토'];

const today=new Date();
const TODAY_Y=today.getFullYear(), TODAY_M=today.getMonth()+1, TODAY_D=today.getDate();

let state={page:'index', year:TODAY_Y, month:TODAY_M, day:TODAY_D, collectionId:null};

/* ===================== 데이터 캐시 ===================== */
let dailyCache={};          // 'YYYY-MM' -> {goals:[], days:{'1':[...]}}
let monthLoading={};        // 'YYYY-MM' -> Promise
let futureCache={};         // 'YYYY' -> {1:[...],...,12:[...]}
let futureLoading={};
let collectionsData=null;   // array | null
let collectionsLoadingPromise=null;

async function getMonthData(ym){
  if(dailyCache[ym]) return dailyCache[ym];
  if(monthLoading[ym]) return monthLoading[ym];
  monthLoading[ym]=(async()=>{
    let data;
    try{
      const res=await window.storage.get('daily:'+ym,false);
      data = res && res.value ? JSON.parse(res.value) : {goals:[],days:{}};
    }catch(e){ data={goals:[],days:{}}; }
    if(!data.goals) data.goals=[];
    if(!data.days) data.days={};
    dailyCache[ym]=data;
    delete monthLoading[ym];
    return data;
  })();
  return monthLoading[ym];
}

async function getFutureYear(y){
  if(futureCache[y]) return futureCache[y];
  if(futureLoading[y]) return futureLoading[y];
  futureLoading[y]=(async()=>{
    let data;
    try{
      const res=await window.storage.get('future:'+y,false);
      data = res && res.value ? JSON.parse(res.value) : {};
    }catch(e){ data={}; }
    for(let m=1;m<=12;m++){ if(!data[m]) data[m]=[]; }
    futureCache[y]=data;
    delete futureLoading[y];
    return data;
  })();
  return futureLoading[y];
}

async function ensureCollectionsLoaded(){
  if(collectionsData!==null) return collectionsData;
  if(!collectionsLoadingPromise){
    collectionsLoadingPromise=(async()=>{
      let data;
      try{
        const res=await window.storage.get('collections',false);
        data = res && res.value ? JSON.parse(res.value) : [];
      }catch(e){ data=[]; }
      collectionsData=data;
      return data;
    })();
  }
  return collectionsLoadingPromise;
}

function futureYearsNeeded(){
  const years=new Set();
  let y=state.year, m=state.month;
  for(let i=0;i<6;i++){
    m++; if(m>12){m=1;y++;}
    years.add(y);
  }
  return [...years];
}

/* ===================== 저장 큐 (직렬 처리 + 낙관적 UI) ===================== */
const pendingSaves=new Map();
const saveTimers=new Map();
const saveQueue=[];
let queueRunning=false;

function markDirty(key,value){
  pendingSaves.set(key,value);
  if(saveTimers.has(key)) clearTimeout(saveTimers.get(key));
  saveTimers.set(key, setTimeout(()=>enqueueSave(key), 1200));
}
function enqueueSave(key){
  saveTimers.delete(key);
  if(!saveQueue.includes(key)) saveQueue.push(key);
  processQueue();
}
async function processQueue(){
  if(queueRunning) return;
  queueRunning=true;
  while(saveQueue.length){
    const key=saveQueue.shift();
    const value=pendingSaves.get(key);
    if(value===undefined) continue;
    await saveWithRetry(key,value);
    pendingSaves.delete(key);
  }
  queueRunning=false;
}
async function saveWithRetry(key,value,attempt=0){
  try{
    const result=await window.storage.set(key, JSON.stringify(value), false);
    if(!result) throw new Error('empty result');
    return true;
  }catch(e){
    if(attempt<2){
      await sleep(700*(attempt+1));
      return saveWithRetry(key,value,attempt+1);
    }
    showToast('저장이 지연되고 있어요. 잠시 후 자동으로 다시 시도할게요.');
    setTimeout(()=>{ pendingSaves.set(key,value); enqueueSave(key); }, 15000);
    return false;
  }
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'){
    for(const k of pendingSaves.keys()){
      if(saveTimers.has(k)){ clearTimeout(saveTimers.get(k)); saveTimers.delete(k); }
      enqueueSave(k);
    }
  }
});
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>t.classList.remove('show'),2600);
}

/* ===================== 영역 간 보내기(복사/이동) ===================== */
let sendCtx=null; // {kind, refs, target, dateVal, monthVal, collId, newCollTitle, move}

function pad2(n){return String(n).padStart(2,'0');}
function todayISO(){ return `${TODAY_Y}-${pad2(TODAY_M)}-${pad2(TODAY_D)}`; }
function thisMonthISO(){ return `${TODAY_Y}-${pad2(TODAY_M)}`; }

const SEND_LABEL={daily:'일일로그', goal:'월간 목표', future:'미래로그', collection:'컬렉션'};

function openSendModal(kind, refs){
  sendCtx={kind, refs, target:'daily', dateVal:todayISO(), monthVal:thisMonthISO(), collId:'', newCollTitle:'', move:false};
  renderSendModal();
}
function closeSendModal(){
  sendCtx=null;
  const el=document.getElementById('sendModalOverlay');
  if(el) el.remove();
}
function setSendTarget(t){
  if(!sendCtx) return;
  sendCtx.target=t;
  renderSendModal();
}
function onCollSelectChange(v){ if(sendCtx){ sendCtx.collId=v; renderSendModal(); } }

function getSourceItem(){
  const {kind, refs}=sendCtx;
  if(kind==='daily'){ const d=dailyCache[refs.ym]; return d && (d.days[refs.day]||[]).find(e=>e.id===refs.id); }
  if(kind==='goal'){ const d=dailyCache[refs.ym]; return d && d.goals.find(x=>x.id===refs.id); }
  if(kind==='future'){ const d=futureCache[refs.year]; return d && d[refs.month] && d[refs.month].find(x=>x.id===refs.id); }
  if(kind==='collection'){ const c=collectionsData && collectionsData.find(x=>x.id===refs.cid); return c && c.items.find(x=>x.id===refs.id); }
  return null;
}
function isSourceDone(item){
  if(item.type){ return item.type==='task' ? item.status==='done' : false; }
  return !!item.done;
}

async function renderSendModal(){
  if(!sendCtx) return;
  await ensureCollectionsLoaded();
  const item=getSourceItem();
  if(!item){ closeSendModal(); return; }

  const collOptions=(collectionsData||[]).map(c=>
    `<option value="${c.id}" ${sendCtx.collId===c.id?'selected':''}>${esc(c.title)}</option>`).join('');

  let fields='';
  if(sendCtx.target==='daily'){
    fields=`<label class="modal-label">날짜 선택</label>

function removeSourceItem(){
  const {kind, refs}=sendCtx;
  if(kind==='daily'){
    const data=dailyCache[refs.ym];
    data.days[refs.day]=(data.days[refs.day]||[]).filter(e=>e.id!==refs.id);
    markDirty('daily:'+refs.ym, data);
  }else if(kind==='goal'){
    const data=dailyCache[refs.ym];
    data.goals=data.goals.filter(x=>x.id!==refs.id);
    markDirty('daily:'+refs.ym, data);
  }else if(kind==='future'){
    const data=futureCache[refs.year];
    data[refs.month]=data[refs.month].filter(x=>x.id!==refs.id);
    markDirty('future:'+refs.year, data);
  }else if(kind==='collection'){
    const c=collectionsData.find(x=>x.id===refs.cid);
    c.items=c.items.filter(x=>x.id!==refs.id);
    markDirty('collections', collectionsData);
  }
}

async function confirmSend(){
  const item=getSourceItem();
  if(!item){ closeSendModal(); return; }
  const text=item.text;
  const done=isSourceDone(item);
  const target=sendCtx.target;

  try{
    if(target==='daily'){
      const [y,m,d]=sendCtx.dateVal.split('-').map(Number);
      const ym=ymKey(y,m);
      await getMonthData(ym);
      const data=dailyCache[ym];
      if(!data.days[d]) data.days[d]=[];
      const newType = item.type || 'task';
      data.days[d].push({id:uid(), type:newType, text, status: newType==='task' ? (done?'done':'todo') : undefined});
      markDirty('daily:'+ym, data);
    }else if(target==='goal'){
      const [y,m]=sendCtx.monthVal.split('-').map(Number);
      const ym=ymKey(y,m);
      await getMonthData(ym);
      const data=dailyCache[ym];
      data.goals.push({id:uid(), text, done});
      markDirty('daily:'+ym, data);
    }else if(target==='future'){
      const [y,m]=sendCtx.monthVal.split('-').map(Number);
      await getFutureYear(y);
      const data=futureCache[y];
      if(!data[m]) data[m]=[];
      data[m].push({id:uid(), text, done});
      markDirty('future:'+y, data);
    }else if(target==='collection'){
      await ensureCollectionsLoaded();
      let cid=sendCtx.collId;
      if(cid==='__new__'){
        const title=(sendCtx.newCollTitle||'').trim();
        if(!title){ showToast('컬렉션 이름을 입력해주세요'); return; }
        const newC={id:uid(), title, items:[]};
        collectionsData.push(newC);
        cid=newC.id;
      }
      if(!cid){ showToast('컬렉션을 선택해주세요'); return; }
      const c=collectionsData.find(x=>x.id===cid);
      if(!c){ showToast('컬렉션을 선택해주세요'); return; }
      c.items.push({id:uid(), text, done});
      markDirty('collections', collectionsData);
    }
  }catch(e){
    showToast('보내는 중 문제가 생겼어요. 다시 시도해주세요.');
    return;
  }

  if(sendCtx.move) removeSourceItem();
  showToast(sendCtx.move ? '이동했어요' : '복사했어요');
  closeSendModal();
  render();
}

function shiftMonth(delta){
  let m=state.month+delta, y=state.year;
  while(m>12){m-=12;y++;}
  while(m<1){m+=12;y--;}
  goMonthly(y,m);
}
function shiftDay(delta){
  const d=new Date(state.year, state.month-1, state.day);
  d.setDate(d.getDate()+delta);
  goDaily(d.getFullYear(), d.getMonth()+1, d.getDate());
}

function bulletChar(entry){
  if(entry.type==='event') return '○';
  if(entry.type==='note') return '–';
  switch(entry.status){
    case 'done': return '✓';
    case 'migrated': return '→';
    case 'cancelled': return '✕';
    default: return '•';
  }
}
function bulletClass(entry){
  if(entry.type!=='task') return '';
  return {todo:'b-todo',done:'b-done',migrated:'b-migrated',cancelled:'b-cancelled'}[entry.status]||'b-todo';
}
function textClass(entry){
  if(entry.type!=='task') return '';
  return {done:'done',migrated:'migrated',cancelled:'cancelled'}[entry.status]||'';
}

function setAddType(type, btn){

function makeEditable(spanEl, currentText, onCommit){
  const input=document.createElement('input');
  input.type='text';
  input.value=currentText;
  input.className='inline-edit-input';
  spanEl.replaceWith(input);
  input.focus();
  input.setSelectionRange(input.value.length, input.value.length);
  let done=false;
  function commit(){
    if(done) return; done=true;
    const v=input.value.trim();
    onCommit(v || currentText);
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); input.blur(); }
    if(e.key==='Escape'){ done=true; input.value=currentText; input.replaceWith(spanEl); }
  });
}
function armConfirm(btn, onConfirm){
  if(btn.dataset.armed==='1'){
    clearTimeout(btn._armTimer);
    onConfirm();
    return;
  }
  const original=btn.textContent;
  btn.dataset.armed='1';
  btn.textContent='정말 삭제?';
  btn.classList.add('danger-armed');
  btn._armTimer=setTimeout(()=>{
    btn.dataset.armed='0';
    btn.textContent=original;
    btn.classList.remove('danger-armed');
  }, 3000);
}

/* ===================== 드래그로 순서 바꾸기 ===================== */
let dragCtx=null;

document.addEventListener('pointerdown', function(e){
  const handle=e.target.closest('.drag-handle');
  if(!handle) return;
  const row=handle.closest('.entry-row,.chk-row');
  const container=handle.closest('.entry-list,.chk-list');
  if(!row || !container) return;
  e.preventDefault();
  beginDrag(row, container, e);
});

function beginDrag(row, container, e){
  const rowRect=row.getBoundingClientRect();
  const listRect=container.getBoundingClientRect();

  const placeholder=document.createElement(row.tagName);
  placeholder.className=row.className+' drag-placeholder';
  placeholder.style.height=rowRect.height+'px';
  container.replaceChild(placeholder, row);

  row.style.position='absolute';
  row.style.left=(rowRect.left-listRect.left)+'px';
  row.style.top=(rowRect.top-listRect.top)+'px';
  row.style.width=rowRect.width+'px';
  row.style.zIndex='999';
  row.classList.add('dragging');
  container.appendChild(row);

  dragCtx={
    row, container, placeholder,
    pointerStartY:e.clientY,
    rowStartTop: rowRect.top-listRect.top,
    rowHeight: rowRect.height,
  };
  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}

function onDragMove(e){
  if(!dragCtx) return;
  const {row,container,placeholder,pointerStartY,rowStartTop,rowHeight}=dragCtx;
  const deltaY=e.clientY-pointerStartY;
  row.style.top=(rowStartTop+deltaY)+'px';
  const visualCenter = rowStartTop + deltaY + rowHeight/2;

  const listRect=container.getBoundingClientRect();
  const realSiblings=[...container.children].filter(c=>c!==row && c!==placeholder);
  let targetIndex=realSiblings.length;
  for(let i=0;i<realSiblings.length;i++){
    const r=realSiblings[i].getBoundingClientRect();
    const mid=(r.top-listRect.top)+r.height/2;
    if(visualCenter < mid){ targetIndex=i; break; }
  }
  if(container.contains(placeholder)) container.removeChild(placeholder);
  const refNode = realSiblings[targetIndex] || null;
  container.insertBefore(placeholder, refNode);
}

function onDragEnd(){
  if(!dragCtx) return;
  const {row,container,placeholder}=dragCtx;
  container.insertBefore(row, placeholder);
  container.removeChild(placeholder);
  row.style.position='';
  row.style.left='';
  row.style.top='';
  row.style.width='';
  row.style.zIndex='';
  row.classList.remove('dragging');

  const kind=container.dataset.kind;
  const idsOrder=[...container.children]
    .filter(c=>c.dataset && c.dataset.id)
    .map(c=>c.dataset.id);

  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);
  dragCtx=null;

  commitReorder(kind, container, idsOrder);
}

function commitReorder(kind, container, idsOrder){
  if(kind==='daily'){
    const ym=container.dataset.ym, day=Number(container.dataset.day);
    const data=dailyCache[ym];
    const map=new Map((data.days[day]||[]).map(x=>[x.id,x]));
    data.days[day]=idsOrder.map(id=>map.get(id)).filter(Boolean);
    markDirty('daily:'+ym, data);
  }else if(kind==='goal'){
    const ym=container.dataset.ym;
    const data=dailyCache[ym];
    const map=new Map(data.goals.map(x=>[x.id,x]));
    data.goals=idsOrder.map(id=>map.get(id)).filter(Boolean);
    markDirty('daily:'+ym, data);
  }else if(kind==='future'){
    const year=Number(container.dataset.year), month=Number(container.dataset.month);
    const data=futureCache[year];
    const map=new Map(data[month].map(x=>[x.id,x]));
    data[month]=idsOrder.map(id=>map.get(id)).filter(Boolean);
    markDirty('future:'+year, data);
  }else if(kind==='collection'){
    const cid=container.dataset.cid;
    const c=collectionsData.find(x=>x.id===cid);
    const map=new Map(c.items.map(x=>[x.id,x]));
    c.items=idsOrder.map(id=>map.get(id)).filter(Boolean);
    markDirty('collections', collectionsData);
  }
  render();
}

  let cells='';
  for(let i=0;i<fw;i++) cells+='<div class="cal-cell empty"></div>';
  for(let d=1; d<=dim; d++){
    const entries=(data.days[d]||[]);
    const isToday = state.year===TODAY_Y && state.month===TODAY_M && d===TODAY_D;
    const preview=entries.slice(0,2).map(e=>`<div class="cal-preview">${bulletChar(e)} ${esc(e.text)}</div>`).join('');
    const more = entries.length>2 ? `<div class="cal-more">+${entries.length-2}</div>` : '';
    cells+=`<div class="cal-cell ${isToday?'today':''}" onclick="goDaily(${state.year},${state.month},${d})">
      <div class="cal-date">${d}</div>${preview}${more}
    </div>`;
  }

  const goalsRows = data.goals.map(g=>`
    <div class="chk-row" data-id="${g.id}">
      <span class="drag-handle">⠿</span>
      <div class="chk-box ${g.done?'done':''}" onclick="toggleGoal('${ym}','${g.id}')">${g.done?'✓':''}</div>
      <span class="chk-text ${g.done?'done':''}" onclick="startEditGoal('${ym}','${g.id}',this)">${esc(g.text)}</span>
      <button class="send-btn" title="다른 곳으로 보내기" onclick="openSendModal('goal',{ym:'${ym}',id:'${g.id}'})">↪</button>
      <button class="del-btn" onclick="deleteGoal('${ym}','${g.id}')">×</button>
    </div>`).join('');
  const goalsHtml = data.goals.length
    ? `<div class="chk-list" data-kind="goal" data-ym="${ym}">${goalsRows}</div>`
    : '<div class="empty-msg">이번 달 목표를 적어보세요</div>';

  return `
    <div class="tape monthly">월간 로그</div>
    <div class="page-head">
      <div class="nav-arrows">
        <button class="arrow-btn" onclick="shiftMonth(-1)">‹</button>
        <strong>${state.year}년 ${state.month}월</strong>
        <button class="arrow-btn" onclick="shiftMonth(1)">›</button>
      </div>
      <button class="today-btn" onclick="goThisMonth()">이번 달</button>
    </div>
    <div class="card">
      <div class="cal-grid">
        ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
    <div class="card">
      <h3>이번 달 목표 · 할 일</h3>
      ${goalsHtml}
      <div class="add-form" data-onadd="handleAddGoal" data-ym="${ym}">
        <div class="input-row">
          <input class="text-input" name="text" placeholder="목표나 할 일 추가" autocomplete="off" onkeydown="inputEnter(event,this.nextElementSibling)">
          <button class="add-btn" type="button" onclick="submitAddForm(this)">추가</button>
        </div>
      </div>
    </div>
  `;
}

/* ===================== 렌더링 : 일일 로그 ===================== */
function dailyHtml(){
  const ym=ymKey(state.year,state.month);
  const data=dailyCache[ym];
  const list=(data.days[state.day]||[]);
  const wd=DOW[new Date(state.year,state.month-1,state.day).getDay()];

  const rowsHtml=list.map(e=>{
    const isTask = e.type==='task';
    return `<li class="entry-row" data-id="${e.id}">
      <span class="drag-handle">⠿</span>
      <button class="bullet-btn ${bulletClass(e)}" ${isTask?`onclick="cycleTaskStatus('${ym}',${state.day},'${e.id}')"`:'disabled style="cursor:default;"'}>${bulletChar(e)}</button>
      <span class="entry-text ${textClass(e)}" onclick="startEditDailyEntry('${ym}',${state.day},'${e.id}',this)">${esc(e.text)}</span>
      <button class="send-btn" title="다른 곳으로 보내기" onclick="openSendModal('daily',{ym:'${ym}',day:${state.day},id:'${e.id}'})">↪</button>
      <button class="del-btn" onclick="deleteDailyEntry('${ym}',${state.day},'${e.id}')">×</button>
    </li>`;
  }).join('');
  const rows = list.length
    ? `<ul class="entry-list" data-kind="daily" data-ym="${ym}" data-day="${state.day}">${rowsHtml}</ul>`
    : '<div class="empty-msg">오늘의 첫 기록을 남겨보세요 ✎</div>';

  return `
    <div class="tape daily">일일 로그</div>
    <div class="page-head">
      <div class="nav-arrows">
        <button class="arrow-btn" onclick="shiftDay(-1)">‹</button>
        <strong>${state.month}월 ${state.day}일 (${wd})</strong>
        <button class="arrow-btn" onclick="shiftDay(1)">›</button>
      </div>
      <button class="today-btn" onclick="goTodayDaily()">오늘</button>
    </div>
    <div class="card">
      ${rows}
      <div class="add-form" data-onadd="handleAddDaily" data-ym="${ym}" data-day="${state.day}">
        <input type="hidden" name="type" value="task">
        <div class="type-row">
          <button type="button" class="type-btn active" onclick="setAddType('task',this)">• 할 일</button>
          <button type="button" class="type-btn" onclick="setAddType('event',this)">○ 이벤트</button>
          <button type="button" class="type-btn" onclick="setAddType('note',this)">– 메모</button>
        </div>
        <div class="input-row">
          <input class="text-input" name="text" placeholder="내용을 입력하세요" autocomplete="off" onkeydown="inputEnter(event,this.closest('.add-form').querySelector('.add-btn'))">
          <button class="add-btn" type="button" onclick="submitAddForm(this)">추가</button>
        </div>
      </div>
    </div>
    <div class="subhead">기호를 탭하면 할 일 상태가 바뀌어요: • 미완료 → ✓ 완료 → → 다음날 이동 → ✕ 취소</div>
  `;
}

/* ===================== 렌더링 : 미래 로그 ===================== */
function futureHtml(){
  let y=state.year, m=state.month;
  let sections='';
  for(let i=0;i<6;i++){
    m++; if(m>12){m=1;y++;}
    const data=futureCache[y];
    const items=data[m];
    const itemRows=items.map(it=>`
      <div class="chk-row" data-id="${it.id}">
        <span class="drag-handle">⠿</span>
        <div class="chk-box ${it.done?'done':''}" onclick="toggleFutureItem(${y},${m},'${it.id}')">${it.done?'✓':''}</div>
        <span class="chk-text ${it.done?'done':''}" onclick="startEditFuture(${y},${m},'${it.id}',this)">${esc(it.text)}</span>
        <button class="send-btn" title="다른 곳으로 보내기" onclick="openSendModal('future',{year:${y},month:${m},id:'${it.id}'})">↪</button>
        <button class="del-btn" onclick="deleteFutureItem(${y},${m},'${it.id}')">×</button>
      </div>`).join('');
    const rows = items.length
      ? `<div class="chk-list" data-kind="future" data-year="${y}" data-month="${m}">${itemRows}</div>`
      : '<div class="empty-msg">아직 계획이 없어요</div>';
    sections+=`
      <div class="card">
        <h3>${y}년 ${m}월</h3>
        ${rows}
        <div class="add-form" data-onadd="handleAddFuture" data-year="${y}" data-month="${m}">
          <div class="input-row">
            <input class="text-input" name="text" placeholder="일정이나 목표 추가" autocomplete="off" onkeydown="inputEnter(event,this.nextElementSibling)">
            <button class="add-btn" type="button" onclick="submitAddForm(this)">추가</button>
          </div>
        </div>
      </div>`;
  }
  return `
    <div class="tape future">미래 로그</div>
    <div class="subhead">앞으로 6개월 동안의 일정과 목표를 미리 적어두세요</div>
    ${sections}
  `;
}

/* ===================== 렌더링 : 컬렉션 ===================== */
function collectionsHtml(){
  if(state.collectionId){
    const c=collectionsData.find(x=>x.id===state.collectionId);
    if(!c){ state.collectionId=null; return collectionsHtml(); }
    const itemRows=c.items.map(it=>`
      <div class="chk-row" data-id="${it.id}">
        <span class="drag-handle">⠿</span>
        <div class="chk-box ${it.done?'done':''}" onclick="toggleCollectionItem('${c.id}','${it.id}')">${it.done?'✓':''}</div>
        <span class="chk-text ${it.done?'done':''}" onclick="startEditCollectionItem('${c.id}','${it.id}',this)">${esc(it.text)}</span>
        <button class="send-btn" title="다른 곳으로 보내기" onclick="openSendModal('collection',{cid:'${c.id}',id:'${it.id}'})">↪</button>
        <button class="del-btn" onclick="deleteCollectionItem('${c.id}','${it.id}')">×</button>
      </div>`).join('');
    const rows = c.items.length
      ? `<div class="chk-list" data-kind="collection" data-cid="${c.id}">${itemRows}</div>`
      : '<div class="empty-msg">첫 항목을 추가해보세요</div>';
    return `
      <div class="tape collection">컬렉션</div>
      <button class="back-link" onclick="goCollections()">‹ 컬렉션 목록으로</button>
      <div class="page-head">
        <h3 style="margin:0;" onclick="startEditCollectionTitle('${c.id}',this)">${esc(c.title)}</h3>
      </div>
      <div class="detail-actions">
        <button class="action-btn danger" onclick="armConfirm(this, ()=>deleteCollection('${c.id}'))">컬렉션 삭제</button>
      </div>
      <div class="card">
        ${rows}
        <div class="add-form" data-onadd="handleAddCollectionItem" data-cid="${c.id}">
          <div class="input-row">
            <input class="text-input" name="text" placeholder="항목 추가" autocomplete="off" onkeydown="inputEnter(event,this.nextElementSibling)">
            <button class="add-btn" type="button" onclick="submitAddForm(this)">추가</button>
          </div>
        </div>
      </div>
      <div class="subhead">제목을 탭하면 이름을 바꿀 수 있어요</div>
    `;
  }
  const list=(collectionsData||[]).map(c=>`
    <div class="coll-card" onclick="openCollection('${c.id}')">
      <div class="ctitle">${esc(c.title)}</div>
      <div class="cmeta">${c.items.length}개 항목 · 완료 ${c.items.filter(i=>i.done).length}개</div>
    </div>`).join('');
  return `
    <div class="tape collection">컬렉션</div>
    <div class="card">
      <h3>새 컬렉션 만들기</h3>
      <div class="add-form" data-onadd="handleAddCollection">
        <div class="input-row">
          <input class="text-input" name="text" placeholder="예: 읽고 싶은 책" autocomplete="off" onkeydown="inputEnter(event,this.nextElementSibling)">
          <button class="add-btn" type="button" onclick="submitAddForm(this)">만들기</button>
        </div>
      </div>
    </div>
    ${list || '<div class="empty-msg">아직 컬렉션이 없어요. 위에서 첫 컬렉션을 만들어보세요 ✎</div>'}
  `;
}

/* ===================== 메인 렌더 ===================== */
async function render(){
  const app=document.getElementById('app');
  app.innerHTML=shellHtml();
  const content=document.getElementById('content');

  if(state.page==='index'){
    if(collectionsData===null) content.innerHTML='<p class="loading">불러오는 중…</p>';
    await ensureCollectionsLoaded();
    content.innerHTML=indexHtml();

  }else if(state.page==='monthly'){
    const ym=ymKey(state.year,state.month);
    if(!dailyCache[ym]) content.innerHTML='<p class="loading">불러오는 중…</p>';
    await getMonthData(ym);
    content.innerHTML=monthlyHtml();

  }else if(state.page==='daily'){
    const ym=ymKey(state.year,state.month);
    if(!dailyCache[ym]) content.innerHTML='<p class="loading">불러오는 중…</p>';
    await getMonthData(ym);
    content.innerHTML=dailyHtml();

  }else if(state.page==='future'){
    const years=futureYearsNeeded();
    const missing=years.filter(y=>!futureCache[y]);
    if(missing.length) content.innerHTML='<p class="loading">불러오는 중…</p>';
    for(const y of years){ await getFutureYear(y); }
    content.innerHTML=futureHtml();

  }else if(state.page==='collections'){
    if(collectionsData===null) content.innerHTML='<p class="loading">불러오는 중…</p>';
    await ensureCollectionsLoaded();
    content.innerHTML=collectionsHtml();
  }
}

(async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  if(currentUser) render(); else renderLogin();
})();
</script>
